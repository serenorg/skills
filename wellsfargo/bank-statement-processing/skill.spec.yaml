skill: bank-statement-processing
description: Authenticate to Wells Fargo with runtime prompts, download statements as local PDFs, extract and categorize transactions, and persist masked metadata into SerenDB.
triggers:
  - download my wells fargo statements
  - sync wells fargo pdf statements
  - parse wells fargo transactions
runtime:
  language: python
  entrypoint: scripts/run.py
inputs:
  mode:
    type: string
    enum:
      - read-only
    default: read-only
  months:
    type: integer
    min: 3
    max: 24
    default: 3
  out:
    type: string
    default: artifacts/wellsfargo
secrets:
  - WF_LLM_API_KEY
connectors:
  browser:
    kind: seren_publisher
    publisher: playwright-local-mcp
  serendb:
    kind: seren_publisher
    publisher: serendb
state:
  checkpoints:
    kind: sqlite
    file: artifacts/wellsfargo/state/checkpoint.json
policies:
  dry_run_default: false
  idempotency_required: true
workflow:
  steps:
    - id: auth_prompted
      use: transform.prompt_runtime_credentials
    - id: otp_waiting
      use: transform.prompt_runtime_otp
    - id: authenticated
      use: connector.browser.auth
    - id: statement_indexed
      use: connector.browser.list_statements
    - id: pdf_downloaded
      use: connector.browser.download_pdfs
    - id: pdf_parsed
      use: transform.parse_pdfs
    - id: classified
      use: transform.categorize_transactions
    - id: serendb_synced
      use: connector.serendb.upsert
    - id: complete
      use: transform.write_report
publish:
  org: seren-skills
  slug: bank-statement-processing
metadata:
  category: finance
